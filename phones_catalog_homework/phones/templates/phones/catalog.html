<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Каталог</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        .sort {
            display: flex;
            gap: 24px;
            margin: 48px 0 32px;
        }

        .grid {
            display: grid;
            gap: 48px;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
        }

        .phone a {
            color: #06f;
            font-size: 30px;
            text-decoration: none;
        }

        .price {
            font-weight: 700;
            margin: 8px 0;
        }

        .phone img {
            display: block;
            height: 380px;
            max-width: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <h1>Каталог</h1>

    <div class="sort">
        <span>Сортировать по:</span>
        <a href="{% url 'catalog' %}?sort=name">названию</a>
        <a href="{% url 'catalog' %}?sort=min_price">начиная с дешёвых</a>
        <a href="{% url 'catalog' %}?sort=max_price">начиная с дорогих</a>
    </div>

    <div class="grid">
        {% for phone in phones %}
            <article class="phone">
                <a href="{% url 'phone_detail' phone.slug %}">{{ phone.name }}</a>
                <div class="price">Стоимость: {{ phone.price|floatformat:1 }} ₽</div>
                <img src="{{ phone.image }}" alt="{{ phone.name }}">
            </article>
        {% endfor %}
    </div>
</body>
</html>
